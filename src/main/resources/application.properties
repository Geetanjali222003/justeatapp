spring.application.name=CAPSTONE

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/capstone_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server Port
server.port=8083

# -------------------------------------------------------
# Email configuration (Gmail SMTP example)
# IMPORTANT: For Gmail, use an App Password (not your real password).
# Steps: Google Account -> Security -> 2-Step Verification -> App Passwords
# Replace the values below with your real credentials.
# In production, use environment variables: ${MAIL_USERNAME} / ${MAIL_PASSWORD}
# -------------------------------------------------------
#for sending otp email creation
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=justeatapp111@gmail.com
spring.mail.password=invdyaltbwoyareh

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Set to true only if not using STARTTLS (usually false for Gmail)
spring.mail.properties.mail.smtp.ssl.enable=false

# Password reset token config
# How many minutes the reset link is valid before it expires
app.password-reset.expiry-minutes=15
# Base URL of the React frontend (used in the reset email link)
app.password-reset.frontend-url=http://localhost:3000

# JWT configuration
# NOTE: In production, keep the secret outside git (env var / vault). Must be at least 256-bit for HS256.
# 32+ chars plain text secret (OK for local dev). For production: use env var / vault.
app.jwt.secret=dev-secret-please-change-this-to-a-long-random-string-32-plus
app.jwt.expiration-ms=86400000

# -------------------------------------------------------
# Redis Configuration for OTP verification
# -------------------------------------------------------
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=60000
spring.data.redis.repositories.enabled=false

